services:
  postgres:
    image: postgres:16-alpine
    container_name: coop-saving-postgres
    environment:
      POSTGRES_DB: coop_saving
      POSTGRES_USER: coop
      POSTGRES_PASSWORD: coop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
