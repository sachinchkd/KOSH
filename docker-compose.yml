services:
  postgres:
    image: postgres:16
    container_name: coop-saving-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coop_saving
      POSTGRES_USER: coop
      POSTGRES_PASSWORD: coop_password
    ports:
      - "5432:5432"
    volumes:
      - coop_postgres_data:/var/lib/postgresql/data

volumes:
  coop_postgres_data:
